name: wp2fapp
description: "WordPress to Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  video_player: ^2.9.2
  webview_flutter: ^4.10.0
  html: ^0.15.5
  package_info_plus: ^8.3.1
  google_fonts: ^8.0.2
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - app_config.json
    - assets/branding/
